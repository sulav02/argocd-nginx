apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: apache-staging
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sulav02/argocd-nginx
    targetRevision: main
    path: apache  

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true