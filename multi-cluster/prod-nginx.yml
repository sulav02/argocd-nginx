apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nginx-prod
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://github.com/sulav02/argocd-nginx
    targetRevision: main
    path: nginx

  destination:
    server: https://kubernetes.default.svc
    namespace: prod

  syncPolicy:
    automated:
      prune: false   # IMPORTANT for prod safety
      selfHeal: true
    syncOptions:
      - CreateNamespace=true